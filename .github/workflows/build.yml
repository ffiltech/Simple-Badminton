name: Build Release APKs

# Triggers on version tags (e.g. v1.0.6) or manual dispatch.
# Builds on Linux so the path embedded in the APK is consistent across environments.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (informational only, uses current checkout)'
        required: false

permissions:
  contents: write   # needed to create/update GitHub Releases

jobs:
  build:
    name: Build Release APKs
    runs-on: ubuntu-latest
    # Expose secrets as job-level env vars so they can be checked in step 'if' conditions
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # android-actions/setup-android installs cmdline-tools and adds sdkmanager to PATH.
      - name: Set up Android SDK (cmdline-tools)
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "ndk;27.1.12297006"

      - name: Install JS dependencies
        run: npm ci

      # Workaround: upstream fix merged 2026-02-13 but not yet shipped (targets RN 0.85).
      # The RN Gradle Plugin calls getHostIpAddress() which returns the builder's LAN IP,
      # making the react_native_dev_server_ip string resource non-deterministic.
      # Match only the resValue call site, not the function definition itself.
      - name: Patch RN Gradle plugin – pin dev server IP to localhost
        run: |
          find node_modules/@react-native/gradle-plugin -name "AgpConfiguratorUtils.kt" \
            -exec sed -i 's/"react_native_dev_server_ip", getHostIpAddress()/"react_native_dev_server_ip", "localhost"/g' {} +

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Decode the signing keystore from the KEYSTORE_BASE64 env var (mapped from secret at job level).
      # If the secret is absent the var is empty, this step is skipped and the build stays unsigned.
      - name: Set up release signing
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          printf 'storeFile=../../release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > keystore.properties

      - name: Build release APKs
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: List produced APKs
        run: find android/app/build/outputs/apk/release -name '*.apk' -exec ls -lh {} \;

      # Always upload as workflow artifacts (available for 90 days, useful for workflow_dispatch runs)
      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      # On tag pushes: create/update the matching GitHub Release and attach the APKs
      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: false
          draft: false
          prerelease: false
